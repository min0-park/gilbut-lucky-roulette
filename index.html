<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>길벗 행운의 룰렛</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: rgba(15, 23, 42, 0.72);
      --panel-border: rgba(255,255,255,0.08);
      --text: #e5eefc;
      --muted: #94a3b8;
      --accent: #7c3aed;
      --accent-2: #06b6d4;
      --danger: #ef4444;
      --shadow: 0 20px 60px rgba(2, 6, 23, 0.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.22), transparent 28%),
        radial-gradient(circle at top right, rgba(6, 182, 212, 0.18), transparent 24%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
    }

    body {
      padding: 28px;
    }

    button, input {
      font: inherit;
    }

    .shell {
      max-width: 1480px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, var(--left-panel-width, 420px)) 1fr;
      gap: 24px;
      align-items: start;
      transition: grid-template-columns 0.24s ease;
    }

    .shell.panel-collapsed {
      --left-panel-width: 0px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .left-panel {
      padding: 24px;
      position: sticky;
      top: 24px;
      transition: opacity 0.24s ease, transform 0.24s ease, padding 0.24s ease, width 0.24s ease, border-width 0.24s ease;
      min-width: 0;
      overflow: hidden;
    }

    .shell.panel-collapsed .left-panel {
      opacity: 0;
      pointer-events: none;
      transform: translateX(-16px);
      padding: 0;
      border-width: 0;
      width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #c4b5fd;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: -0.03em;
    }

    .sub {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .section-title {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #cbd5e1;
      margin: 22px 0 12px;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 110px 44px;
      gap: 10px;
      align-items: center;
    }

    label {
      display: block;
      font-size: 12px;
      color: #cbd5e1;
      margin-bottom: 6px;
      font-weight: 700;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(2, 6, 23, 0.58);
      color: var(--text);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus {
      border-color: rgba(124, 58, 237, 0.9);
      box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
    }

    .remove-btn,
    .ghost-btn,
    .primary-btn,
    .spin-btn,
    .mobile-config-toggle,
    .desktop-config-toggle,
    .mobile-config-close {
      border: 0;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, background 0.2s ease;
      font-weight: 800;
    }

    .remove-btn:hover,
    .ghost-btn:hover,
    .primary-btn:hover,
    .spin-btn:hover,
    .mobile-config-toggle:hover,
    .desktop-config-toggle:hover,
    .mobile-config-close:hover {
      transform: translateY(-1px);
    }

    .remove-btn {
      width: 44px;
      height: 44px;
      background: rgba(239, 68, 68, 0.16);
      color: #fecaca;
      font-size: 18px;
      border-radius: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .ghost-btn,
    .primary-btn {
      padding: 12px 16px;
      font-size: 14px;
      border-radius: 16px;
    }

    .ghost-btn {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      box-shadow: 0 10px 24px rgba(124, 58, 237, 0.28);
    }

    .summary {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.7;
    }

    .right-panel {
      padding: 28px;
      min-height: calc(100vh - 56px);
      position: relative;
    }

    .desktop-config-toggle {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 14;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(15, 23, 42, 0.72);
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 12px 24px rgba(2, 6, 23, 0.26);
    }

    .stage {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 24px;
      align-items: stretch;
    }

    .wheel-wrap {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 720px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      overflow: hidden;
      padding: 24px;
    }

    .wheel-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, rgba(124,58,237,0.18), transparent 36%),
        radial-gradient(circle at center, rgba(6,182,212,0.12), transparent 56%);
      filter: blur(20px);
    }

    .pointer-spin {
      position: absolute;
      top: 30px;
      left: 50%;
      width: 108px;
      height: 108px;
      transform: translateX(-50%) rotate(0deg);
      display: grid;
      place-items: center;
      z-index: 8;
      filter: drop-shadow(0 14px 28px rgba(15, 23, 42, 0.38));
      pointer-events: none;
    }

    .pointer-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.98), rgba(226,232,240,0.92));
      border: 1px solid rgba(255,255,255,0.85);
      box-shadow: inset 0 2px 10px rgba(255,255,255,0.65), 0 12px 26px rgba(15, 23, 42, 0.22);
    }

    .pointer-arrow {
      position: relative;
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 52px solid #8b5cf6;
      transform: translateY(18px);
      z-index: 1;
    }

    .pointer-arrow::before {
      content: '';
      position: absolute;
      left: -9px;
      top: -54px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #0f172a;
      box-shadow: 0 0 0 7px rgba(139, 92, 246, 0.16);
    }

    .mobile-config-toggle {
      display: none;
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      left: 16px;
      z-index: 12;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(15, 23, 42, 0.72);
      color: white;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 12px 24px rgba(2, 6, 23, 0.26);
    }

    .wheel-stack {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 88px 40px 120px;
    }

    canvas {
      width: min(100%, 620px);
      height: auto;
      aspect-ratio: 1 / 1;
      max-width: 620px;
      max-height: 620px;
      border-radius: 50%;
      box-shadow: 0 30px 80px rgba(2, 6, 23, 0.5);
      transition: transform 0.2s ease;
      z-index: 2;
      display: block;
    }

    .hub {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff, #cbd5e1);
      display: grid;
      place-items: center;
      color: #0f172a;
      font-weight: 900;
      letter-spacing: -0.03em;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.3);
      z-index: 3;
      text-align: center;
      line-height: 1.2;
      font-size: 16px;
    }

    .spin-area {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
    }

    .spin-btn {
      padding: 16px 28px;
      font-size: 16px;
      color: white;
      border-radius: 16px;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      box-shadow: 0 16px 40px rgba(124, 58, 237, 0.3);
    }

    .spin-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .result-panel,
    .legend-panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 20px;
    }

    .side-column {
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .side-title {
      margin: 0 0 10px;
      font-size: 18px;
      letter-spacing: -0.02em;
    }

    .winner {
      font-size: 26px;
      font-weight: 900;
      line-height: 1.25;
      margin: 10px 0 8px;
      min-height: 66px;
    }

    .winner-sub,
    .legend-empty {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .legend-list {
      display: grid;
      gap: 12px;
      margin-top: 12px;
      max-height: 480px;
      overflow: auto;
      padding-right: 4px;
    }

    .legend-item {
      display: grid;
      grid-template-columns: 18px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(2, 6, 23, 0.4);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
    }

    .legend-name {
      font-size: 14px;
      font-weight: 700;
    }

    .legend-meta {
      font-size: 12px;
      color: var(--muted);
    }

    .legend-weight {
      font-size: 13px;
      font-weight: 800;
      color: #c4b5fd;
    }

    .mobile-config-sheet {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(2, 6, 23, 0.58);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .mobile-config-sheet.open {
      display: block;
    }

    .mobile-config-backdrop {
      position: absolute;
      inset: 0;
    }

    .mobile-config-panel {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: min(82dvh, 760px);
      background: rgba(15, 23, 42, 0.98);
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 -24px 60px rgba(2, 6, 23, 0.42);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    .mobile-config-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .mobile-config-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .mobile-config-desc {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .mobile-config-close {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 18px;
      flex: 0 0 auto;
    }

    .mobile-config-content {
      overflow: auto;
      padding: 16px 16px 8px;
    }

    .mobile-config-footer {
      padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(15, 23, 42, 0.96);
      display: flex;
      gap: 10px;
    }

    .mobile-config-footer .ghost-btn,
    .mobile-config-footer .primary-btn {
      flex: 1;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      background: rgba(15, 23, 42, 0.94);
      color: white;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: all 0.25s ease;
      z-index: 999;
      max-width: 360px;
      line-height: 1.5;
      font-size: 14px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1100px) {
      .shell,
      .stage {
        grid-template-columns: 1fr;
      }

      .left-panel {
        position: static;
      }

      .wheel-wrap {
        min-height: 620px;
      }

      .desktop-config-toggle {
        display: none;
      }
    }

    @media (min-width: 641px) and (max-width: 1366px) and (orientation: landscape) {
      .desktop-config-toggle {
        display: none;
      }

      body {
        padding: 0;
        min-height: 100dvh;
      }

      .shell {
        max-width: none;
        margin: 0;
        gap: 0;
      }

      .left-panel {
        display: none;
      }

      .right-panel {
        padding: 0;
        min-height: 100dvh;
        border-radius: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      .stage {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .wheel-wrap {
        min-height: 100dvh;
        height: 100dvh;
        border-radius: 0;
        border: 0;
        padding: 0;
      }

      .mobile-config-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .pointer-spin {
        top: max(18px, env(safe-area-inset-top));
      }

      .wheel-stack {
        padding: 92px 24px 126px;
      }

      canvas {
        width: min(68vw, 68vh, 620px);
      }

      .spin-area {
        bottom: calc(28px + env(safe-area-inset-bottom));
      }

      .side-column {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(18px + env(safe-area-inset-top));
        padding: 0 24px 0 104px;
        pointer-events: none;
        z-index: 6;
      }

      .result-panel {
        max-width: 520px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.68);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .legend-panel {
        display: none;
      }

      .side-title {
        margin: 0 0 6px;
        font-size: 14px;
      }

      .winner {
        font-size: 22px;
        min-height: 0;
        margin: 0 0 4px;
      }

      .winner-sub {
        font-size: 12px;
        line-height: 1.45;
      }

      .toast {
        left: auto;
        right: 24px;
        bottom: calc(96px + env(safe-area-inset-bottom));
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 0;
        min-height: 100dvh;
      }

      .shell {
        max-width: none;
        margin: 0;
        gap: 0;
      }

      .left-panel {
        display: none;
      }

      .right-panel {
        padding: 0;
        min-height: 100dvh;
        border-radius: 0;
        border: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      .stage {
        grid-template-columns: 1fr;
        gap: 0;
      }

      .wheel-wrap {
        min-height: 100dvh;
        height: 100dvh;
        border-radius: 0;
        border: 0;
        padding: 0;
      }

      .mobile-config-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .pointer-spin {
        top: calc(14px + env(safe-area-inset-top));
        width: 90px;
        height: 90px;
      }

      .pointer-arrow {
        border-left-width: 15px;
        border-right-width: 15px;
        border-top-width: 44px;
        transform: translateY(15px);
      }

      .wheel-stack {
        padding: 82px 12px 132px;
      }

      canvas {
        width: min(92vw, 92vh, 520px);
      }

      .hub {
        width: 96px;
        height: 96px;
        font-size: 14px;
      }

      .spin-area {
        bottom: calc(24px + env(safe-area-inset-bottom));
        width: calc(100% - 32px);
      }

      .spin-btn {
        width: 100%;
        padding: 18px 20px;
        font-size: 17px;
        border-radius: 18px;
      }

      .side-column {
        position: absolute;
        left: 0;
        right: 0;
        top: calc(16px + env(safe-area-inset-top));
        padding: 0 16px 0 92px;
        pointer-events: none;
        z-index: 6;
      }

      .result-panel {
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(15, 23, 42, 0.68);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
      }

      .legend-panel {
        display: none;
      }

      .side-title {
        margin: 0 0 6px;
        font-size: 14px;
      }

      .winner {
        font-size: 20px;
        min-height: 0;
        margin: 0 0 4px;
      }

      .winner-sub {
        font-size: 12px;
        line-height: 1.4;
      }

      .toast {
        left: 16px;
        right: 16px;
        bottom: calc(96px + env(safe-area-inset-bottom));
        max-width: none;
      }

      .row {
        grid-template-columns: 1fr 92px 40px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="panel left-panel">
      <div class="eyebrow">JavaScript Roulette Event</div>
      <h1>길벗 행운의 룰렛</h1>
      <p class="sub">
        상품명과 당첨 비율을 직접 입력하면 즉시 룰렛에 반영됩니다.<br />
        비율은 상대값으로 계산되므로, 꼭 100으로 맞출 필요는 없습니다.
      </p>

      <div class="section-title">상품 설정</div>
      <div id="itemList" class="list"></div>

      <div class="actions">
        <button id="addItemBtn" class="ghost-btn">+ 상품 추가</button>
        <button id="resetDemoBtn" class="ghost-btn">예시 불러오기</button>
        <button id="saveBtn" class="primary-btn">설정 저장</button>
      </div>

      <div id="summary" class="summary"></div>
    </aside>

    <main class="panel right-panel">
      <button class="desktop-config-toggle" id="desktopConfigToggle" aria-label="설정 패널 열고 닫기">설정 닫기</button>
      <div class="stage">
        <section class="wheel-wrap">
          <div class="wheel-glow"></div>
          <button class="mobile-config-toggle" id="mobileConfigToggle" aria-label="설정 열기">설정</button>

          <div class="pointer-spin" id="pointerSpin" aria-hidden="true">
            <div class="pointer-ring"></div>
            <div class="pointer-arrow"></div>
          </div>

          <div class="wheel-stack">
            <canvas id="wheelCanvas" width="720" height="720"></canvas>
            <div class="hub">길벗<br />행운</div>
          </div>

          <div class="spin-area">
            <button id="spinBtn" class="spin-btn">룰렛 돌리기</button>
          </div>
        </section>

        <aside class="side-column">
          <section class="result-panel">
            <h2 class="side-title">당첨 결과</h2>
            <div id="winner" class="winner">아직 추첨 전입니다</div>
            <div id="winnerSub" class="winner-sub">상품을 설정한 뒤 룰렛을 돌려보세요.</div>
          </section>

          <section class="legend-panel">
            <h2 class="side-title">당첨 비율 미리보기</h2>
            <div id="legendEmpty" class="legend-empty">상품을 2개 이상 입력하면 룰렛이 활성화됩니다.</div>
            <div id="legendList" class="legend-list"></div>
          </section>
        </aside>
      </div>
    </main>
  </div>

  <div id="mobileConfigSheet" class="mobile-config-sheet" aria-hidden="true">
    <div class="mobile-config-backdrop" id="mobileConfigBackdrop"></div>
    <div class="mobile-config-panel" role="dialog" aria-modal="true" aria-labelledby="mobileConfigTitle">
      <div class="mobile-config-header">
        <div>
          <h2 class="mobile-config-title" id="mobileConfigTitle">룰렛 설정</h2>
          <p class="mobile-config-desc">모바일에서도 상품명과 비율을 바로 수정하면 즉시 룰렛에 반영됩니다.</p>
        </div>
        <button class="mobile-config-close" id="mobileConfigClose" aria-label="설정 닫기">×</button>
      </div>
      <div class="mobile-config-content">
        <div id="mobileItemList" class="list"></div>
        <div id="mobileSummary" class="summary"></div>
      </div>
      <div class="mobile-config-footer">
        <button id="mobileAddItemBtn" class="ghost-btn">+ 상품 추가</button>
        <button id="mobileSaveBtn" class="primary-btn">설정 저장</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY = 'gilbutLuckyRouletteConfigV3';

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');

    const shellEl = document.querySelector('.shell');
    const itemListEl = document.getElementById('itemList');
    const mobileItemListEl = document.getElementById('mobileItemList');
    const legendListEl = document.getElementById('legendList');
    const legendEmptyEl = document.getElementById('legendEmpty');
    const winnerEl = document.getElementById('winner');
    const winnerSubEl = document.getElementById('winnerSub');
    const summaryEl = document.getElementById('summary');
    const mobileSummaryEl = document.getElementById('mobileSummary');
    const spinBtn = document.getElementById('spinBtn');
    const toastEl = document.getElementById('toast');
    const pointerSpinEl = document.getElementById('pointerSpin');

    const desktopConfigToggleEl = document.getElementById('desktopConfigToggle');
    const mobileConfigSheetEl = document.getElementById('mobileConfigSheet');
    const mobileConfigToggleEl = document.getElementById('mobileConfigToggle');
    const mobileConfigCloseEl = document.getElementById('mobileConfigClose');
    const mobileConfigBackdropEl = document.getElementById('mobileConfigBackdrop');
    const mobileAddItemBtn = document.getElementById('mobileAddItemBtn');
    const mobileSaveBtn = document.getElementById('mobileSaveBtn');

    const palette = [
      '#8b5cf6', '#06b6d4', '#22c55e', '#f59e0b', '#ef4444', '#ec4899',
      '#3b82f6', '#14b8a6', '#a855f7', '#eab308', '#f97316', '#10b981'
    ];

    const demoItems = [
      { name: '길벗 추천도서', weight: 35 },
      { name: '포인트 3만원', weight: 20 },
      { name: '포인트 1만원', weight: 18 },
      { name: '커피 쿠폰', weight: 17 },
      { name: '꽝', weight: 10 }
    ];

    let items = loadItems();
    let currentRotation = 0;
    let isSpinning = false;
    let isDesktopPanelCollapsed = false;

    function loadItems() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (Array.isArray(saved) && saved.length) {
          return sanitizeItems(saved);
        }
      } catch (e) {}
      return sanitizeItems(demoItems);
    }

    function sanitizeItems(raw) {
      return raw
        .map(item => ({
          name: String(item.name || '').trim(),
          weight: Math.max(0, Number(item.weight) || 0)
        }))
        .filter(item => item.name.length > 0);
    }

    function getValidItems() {
      return sanitizeItems(items).filter(item => item.weight > 0);
    }

    function getTotalWeight(list = getValidItems()) {
      return list.reduce((sum, item) => sum + item.weight, 0);
    }

    function saveItems() {
      const valid = sanitizeItems(items);
      if (valid.length < 2) {
        showToast('상품은 최소 2개 이상 필요합니다.');
        return;
      }

      const positive = valid.filter(item => item.weight > 0);
      if (positive.length < 2) {
        showToast('비율이 0보다 큰 상품이 최소 2개 이상 필요합니다.');
        return;
      }

      items = valid;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      renderAll();
      showToast('설정이 저장되었습니다.');
    }

    function showToast(message) {
      toastEl.textContent = message;
      toastEl.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toastEl.classList.remove('show');
      }, 2200);
    }

    function addItem() {
      items.push({ name: `상품 ${items.length + 1}`, weight: 10 });
      renderAll();
    }

    function removeItem(index) {
      if (items.length <= 2) {
        showToast('상품은 최소 2개 이상 있어야 합니다.');
        return;
      }
      items.splice(index, 1);
      renderAll();
    }

    function updateItem(index, key, value, options = {}) {
      if (!items[index]) return;

      items[index][key] = key === 'weight'
        ? Math.max(0, Number(value) || 0)
        : value;

      if (options.renderEditors) {
        renderAll();
        return;
      }

      renderSummary();
      renderLegend();
      drawWheel();
      updateSpinState();
    }

    function renderItemEditor(container) {
      if (!container) return;
      container.innerHTML = '';

      items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <div class="row">
            <div>
              <label>상품명</label>
              <input type="text" value="${escapeHtml(item.name)}" placeholder="예: 커피 쿠폰" data-index="${index}" data-key="name" />
            </div>
            <div>
              <label>비율</label>
              <input type="number" min="0" step="1" value="${item.weight}" placeholder="10" data-index="${index}" data-key="weight" />
            </div>
            <div style="padding-top: 23px;">
              <button class="remove-btn" data-remove="${index}" title="상품 삭제">×</button>
            </div>
          </div>
        `;
        container.appendChild(card);
      });

      container.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', (e) => {
          const index = Number(e.target.dataset.index);
          const key = e.target.dataset.key;
          updateItem(index, key, e.target.value, { renderEditors: false });
        });

        input.addEventListener('change', (e) => {
          const index = Number(e.target.dataset.index);
          const key = e.target.dataset.key;
          updateItem(index, key, e.target.value, { renderEditors: true });
        });
      });

      container.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          removeItem(Number(e.currentTarget.dataset.remove));
        });
      });
    }

    function renderEditor() {
      renderItemEditor(itemListEl);
      renderItemEditor(mobileItemListEl);
    }

    function renderSummary() {
      const valid = sanitizeItems(items);
      const positive = valid.filter(item => item.weight > 0);
      const total = getTotalWeight(positive);

      if (!valid.length) {
        summaryEl.innerHTML = '상품을 추가해 주세요.';
        mobileSummaryEl.innerHTML = '상품을 추가해 주세요.';
        return;
      }

      const lines = positive.map(item => {
        const ratio = total > 0 ? ((item.weight / total) * 100).toFixed(1) : '0.0';
        return `• ${escapeHtml(item.name)}: ${item.weight} (${ratio}%)`;
      });

      const html = `
        <strong>현재 설정 요약</strong><br />
        총 상품 수: ${valid.length}개<br />
        유효 상품 수: ${positive.length}개<br />
        총 비율 합: ${total}<br /><br />
        ${lines.join('<br />')}
      `;

      summaryEl.innerHTML = html;
      mobileSummaryEl.innerHTML = html;
    }

    function renderLegend() {
      const valid = getValidItems();
      const total = getTotalWeight(valid);
      legendListEl.innerHTML = '';

      if (valid.length < 2 || total <= 0) {
        legendEmptyEl.style.display = 'block';
        return;
      }

      legendEmptyEl.style.display = 'none';

      valid.forEach((item, index) => {
        const ratio = ((item.weight / total) * 100).toFixed(1);
        const el = document.createElement('div');
        el.className = 'legend-item';
        el.innerHTML = `
          <div class="swatch" style="background:${palette[index % palette.length]}"></div>
          <div>
            <div class="legend-name">${escapeHtml(item.name)}</div>
            <div class="legend-meta">당첨 확률 ${ratio}%</div>
          </div>
          <div class="legend-weight">${item.weight}</div>
        `;
        legendListEl.appendChild(el);
      });
    }

    function updateSpinState() {
      const valid = getValidItems();
      spinBtn.disabled = isSpinning || valid.length < 2 || getTotalWeight(valid) <= 0;
    }

    function drawWheel() {
      const valid = getValidItems();
      const total = getTotalWeight(valid);
      const w = canvas.width;
      const h = canvas.height;
      const cx = w / 2;
      const cy = h / 2;
      const radius = 320;
      const innerRadius = 82;

      ctx.clearRect(0, 0, w, h);

      if (valid.length < 2 || total <= 0) {
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#cbd5e1';
        ctx.font = '700 28px Inter, Pretendard, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('상품을 2개 이상 설정해 주세요', cx, cy);
        ctx.restore();
        return;
      }

      let startAngle = -Math.PI / 2;

      valid.forEach((item, index) => {
        const sliceAngle = (item.weight / total) * Math.PI * 2;
        const endAngle = startAngle + sliceAngle;
        const color = palette[index % palette.length];

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        ctx.strokeStyle = 'rgba(255,255,255,0.18)';
        ctx.lineWidth = 2;
        ctx.stroke();

        const mid = (startAngle + endAngle) / 2;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(mid);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ffffff';
        ctx.font = '800 20px Inter, Pretendard, sans-serif';
        wrapText(ctx, item.name, radius - 28, 0, 24, 180);
        ctx.restore();

        startAngle = endAngle;
      });

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, innerRadius, 0, Math.PI * 2);
      ctx.fillStyle = '#f8fafc';
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, radius + 8, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,255,255,0.45)';
      ctx.lineWidth = 12;
      ctx.stroke();
      ctx.restore();
    }

    function wrapText(context, text, x, y, lineHeight, maxWidth) {
      const chars = text.split('');
      const lines = [];
      let line = '';

      for (let i = 0; i < chars.length; i++) {
        const testLine = line + chars[i];
        if (context.measureText(testLine).width > maxWidth && line) {
          lines.push(line);
          line = chars[i];
        } else {
          line = testLine;
        }
      }

      if (line) lines.push(line);

      const finalLines = lines.slice(0, 2).map((ln, idx) => {
        if (idx === 1 && lines.length > 2) {
          let trimmed = ln;
          while (context.measureText(trimmed + '…').width > maxWidth && trimmed.length > 1) {
            trimmed = trimmed.slice(0, -1);
          }
          return trimmed + '…';
        }
        return ln;
      });

      const offset = ((finalLines.length - 1) * lineHeight) / 2;
      finalLines.forEach((ln, i) => {
        context.fillText(ln, x, y - offset + (i * lineHeight));
      });
    }

    function pickWinner() {
      const valid = getValidItems();
      const total = getTotalWeight(valid);
      const random = Math.random() * total;
      let cumulative = 0;

      for (let i = 0; i < valid.length; i++) {
        cumulative += valid[i].weight;
        if (random <= cumulative) {
          return { item: valid[i], index: i, list: valid, total };
        }
      }

      return { item: valid[valid.length - 1], index: valid.length - 1, list: valid, total };
    }

    function getSliceAngles(list) {
      const total = getTotalWeight(list);
      let start = -Math.PI / 2;
      return list.map(item => {
        const slice = (item.weight / total) * Math.PI * 2;
        const data = {
          start,
          end: start + slice,
          mid: start + slice / 2
        };
        start += slice;
        return data;
      });
    }

    function spinWheel() {
      if (isSpinning) return;
      const valid = getValidItems();
      if (valid.length < 2) {
        showToast('상품을 2개 이상 설정해 주세요.');
        return;
      }

      isSpinning = true;
      updateSpinState();
      winnerEl.textContent = '추첨 중…';
      winnerSubEl.textContent = '룰렛이 멈출 때까지 잠시만 기다려 주세요.';

      const result = pickWinner();
      const angles = getSliceAngles(result.list);
      const target = angles[result.index];

      const centerDeg = target.mid * (180 / Math.PI);
      const normalizedCenter = ((centerDeg % 360) + 360) % 360;
      const desiredDeg = 270;
      const extraTurns = 360 * (5 + Math.floor(Math.random() * 3));
      const finalRotation = currentRotation + extraTurns + (desiredDeg - normalizedCenter);
      const pointerTurns = 360 * (8 + Math.floor(Math.random() * 3));
      const pointerOffset = (Math.random() * 28) - 14;

      currentRotation = finalRotation;
      canvas.style.transition = 'transform 5.8s cubic-bezier(0.12, 0.85, 0.18, 1)';
      canvas.style.transform = `rotate(${finalRotation}deg)`;
      pointerSpinEl.style.transition = 'transform 5.8s cubic-bezier(0.1, 0.9, 0.2, 1)';
      pointerSpinEl.style.transform = `translateX(-50%) rotate(${pointerTurns + pointerOffset}deg)`;

      setTimeout(() => {
        const ratio = ((result.item.weight / result.total) * 100).toFixed(1);
        winnerEl.textContent = result.item.name;
        winnerSubEl.textContent = `설정 비율 기준 당첨 확률 ${ratio}% 상품입니다.`;
        isSpinning = false;
        updateSpinState();
        showToast(`당첨 결과: ${result.item.name}`);
      }, 5900);
    }

    function isCompactFullscreenMode() {
      return window.matchMedia('(max-width: 640px)').matches || window.matchMedia('(min-width: 641px) and (max-width: 1366px) and (orientation: landscape)').matches;
    }

    function isDesktopMode() {
      return !isCompactFullscreenMode() && window.innerWidth > 1100;
    }

    function syncDesktopPanelState() {
      if (!shellEl || !desktopConfigToggleEl) return;

      if (!isDesktopMode()) {
        shellEl.classList.remove('panel-collapsed');
        desktopConfigToggleEl.textContent = '설정 닫기';
        return;
      }

      shellEl.classList.toggle('panel-collapsed', isDesktopPanelCollapsed);
      desktopConfigToggleEl.textContent = isDesktopPanelCollapsed ? '설정 열기' : '설정 닫기';
    }

    function toggleDesktopPanel() {
      if (!isDesktopMode()) return;
      isDesktopPanelCollapsed = !isDesktopPanelCollapsed;
      syncDesktopPanelState();
    }

    function openMobileConfig() {
      if (!isCompactFullscreenMode()) return;
      mobileConfigSheetEl.classList.add('open');
      mobileConfigSheetEl.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeMobileConfig() {
      mobileConfigSheetEl.classList.remove('open');
      mobileConfigSheetEl.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderAll() {
      renderEditor();
      renderSummary();
      renderLegend();
      drawWheel();
      updateSpinState();
      syncDesktopPanelState();
    }

    document.getElementById('addItemBtn').addEventListener('click', addItem);
    document.getElementById('saveBtn').addEventListener('click', saveItems);
    document.getElementById('spinBtn').addEventListener('click', spinWheel);
    document.getElementById('resetDemoBtn').addEventListener('click', () => {
      items = JSON.parse(JSON.stringify(demoItems));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      renderAll();
      winnerEl.textContent = '아직 추첨 전입니다';
      winnerSubEl.textContent = '상품을 설정한 뒤 룰렛을 돌려보세요.';
      showToast('예시 설정으로 복원했습니다.');
    });

    mobileAddItemBtn.addEventListener('click', addItem);
    mobileSaveBtn.addEventListener('click', saveItems);
    mobileConfigToggleEl.addEventListener('click', openMobileConfig);
    mobileConfigCloseEl.addEventListener('click', closeMobileConfig);
    mobileConfigBackdropEl.addEventListener('click', closeMobileConfig);
    desktopConfigToggleEl.addEventListener('click', toggleDesktopPanel);

    window.addEventListener('resize', () => {
      if (!isCompactFullscreenMode()) {
        closeMobileConfig();
      }
      syncDesktopPanelState();
    });

    renderAll();
  </script>
</body>
</html>
